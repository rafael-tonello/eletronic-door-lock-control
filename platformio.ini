[env:esp8266]
platform = espressif8266
board = nodemcuv2
framework = arduino
build_unflags = -fno-exceptions
build_flags = -fexceptions -I src/misc/scheduler -I src/keyboard -I src/misc -I src/iohal

; Serial port the ESP8266 is connected to on the HOST machine.
; The container gets access to it via --privileged in devcontainer.json.
; Adjust if your adapter shows up on a different port (ttyUSB1, ttyACM0, etc.)
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
monitor_speed = 115200


