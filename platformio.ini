[env:esp8266]
platform = espressif8266
board = nodemcuv2
framework = arduino
build_unflags = -fno-exceptions
build_flags = -fexceptions -I src -I src/misc/scheduler -I src/keyboard -I src/misc -I src/iohal -I src/log -I src/network -I src/storage

; Serial port the ESP8266 is connected to on the HOST machine.
; The container gets access to it via --privileged in devcontainer.json.
; Adjust if your adapter shows up on a different port (ttyUSB1, ttyACM0, etc.)
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
monitor_speed = 115200

lib_deps =
    vshymanskyy/Preferences@^2.1.0

[env:esp8266_ota]
platform = espressif8266
board = nodemcuv2
framework = arduino
extends = env:d1_mini
build_unflags = -fno-exceptions
build_flags = -fexceptions -I src -I src/misc/scheduler -I src/keyboard -I src/misc -I src/iohal -I src/log -I src/network -I src/storage

upload_protocol = espota
upload_port = 192.168.100.111
; Optional OTA auth:
;  --auth=your_ota_password

monitor_port = /dev/ttyUSB0
monitor_speed = 115200

lib_deps =
    vshymanskyy/Preferences@^2.1.0


